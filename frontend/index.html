<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>openAnime</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Connection indicator: small, unobtrusive, top-right. -->
  <div id="conn" class="conn down" title="WebSocket link to backend">offline</div>

  <!-- Loading / playback overlay, hidden until a command toggles it. -->
  <div id="overlay" class="overlay hidden">
    <div class="spinner"></div>
    <div id="overlay-text">Loading…</div>
  </div>

  <!-- HERO BANNER: reflects the currently focused card. -->
  <header id="hero" class="hero">
    <div class="hero-art" id="hero-art"></div>
    <div class="hero-scrim"></div>
    <div class="hero-meta">
      <h1 id="hero-title">openAnime</h1>
      <p id="hero-sub" class="hero-sub"></p>
      <p id="hero-desc" class="hero-desc"></p>
    </div>
  </header>

  <!-- Card rows are generated by app.js from the sample catalog. -->
  <main id="rows" class="rows"></main>

  <script src="app.js"></script>
</body>
</html>

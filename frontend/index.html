<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>openAnime</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Connection indicator: small, unobtrusive, top-right. -->
  <div id="conn" class="conn down" title="WebSocket link to backend">offline</div>

  <!-- Loading / playback overlay, hidden until a command toggles it. -->
  <div id="overlay" class="overlay hidden">
    <div class="spinner"></div>
    <div id="overlay-text">Loading…</div>
  </div>

  <!-- =============== HOME SCREEN =============== -->
  <div id="home" class="screen">
    <!-- HERO BANNER: reflects the currently focused card. -->
    <header id="hero" class="hero">
      <div class="hero-art" id="hero-art"></div>
      <div class="hero-scrim"></div>
      <div class="hero-meta">
        <h1 id="hero-title">openAnime</h1>
        <p id="hero-sub" class="hero-sub"></p>
        <p id="hero-desc" class="hero-desc"></p>
      </div>
    </header>

    <!-- Persistent search bar; UP from the first row focuses it, OK opens the keyboard. -->
    <div id="searchbar" class="searchbar" data-row="-1">
      <span class="search-icon">⌕</span>
      <span id="search-label" class="search-label">Search</span>
    </div>

    <!-- Card rows are generated by app.js from the AniList catalog / search results. -->
    <main id="rows" class="rows"></main>
  </div>

  <!-- =============== DETAIL (EPISODE LIST) SCREEN =============== -->
  <div id="detail" class="screen detail hidden">
    <div class="detail-art" id="detail-art"></div>
    <div class="detail-scrim"></div>
    <div class="detail-body">
      <div class="detail-meta">
        <h1 id="detail-title"></h1>
        <p id="detail-sub" class="detail-sub"></p>
        <p id="detail-desc" class="detail-desc"></p>
      </div>
      <h2 class="detail-eps-heading">Episodes</h2>
      <div id="episodes" class="episodes"></div>
    </div>
  </div>

  <!-- =============== ON-SCREEN KEYBOARD =============== -->
  <div id="keyboard" class="keyboard hidden">
    <div class="kb-query-wrap">
      <span id="kb-query" class="kb-query"></span>
      <span class="kb-caret">|</span>
    </div>
    <div id="kb-grid" class="kb-grid"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
